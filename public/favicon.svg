<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>
  <!-- Schedule grid: 3 cols × 3 rows of assignment cells -->
  <!-- Row 1 -->
  <rect x="3"  y="3"  width="8" height="7" rx="1.5" fill="#6366f1"/>
  <rect x="13" y="3"  width="7" height="7" rx="1.5" fill="#22c55e"/>
  <rect x="22" y="3"  width="7" height="7" rx="1.5" fill="#6366f1"/>
  <!-- Row 2 -->
  <rect x="3"  y="12" width="8" height="7" rx="1.5" fill="#22c55e"/>
  <rect x="13" y="12" width="7" height="7" rx="1.5" fill="#f97316"/>
  <rect x="22" y="12" width="7" height="7" rx="1.5" fill="#22c55e"/>
  <!-- Row 3 -->
  <rect x="3"  y="22" width="8" height="7" rx="1.5" fill="#6366f1"/>
  <rect x="13" y="22" width="7" height="7" rx="1.5" fill="#22c55e"/>
  <rect x="22" y="22" width="7" height="7" rx="1.5" fill="#a855f7"/>
</svg>
